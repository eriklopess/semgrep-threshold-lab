name: Semgrep SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep — bloqueia em ERROR, alerta em WARNING
        run: |
          semgrep             --config auto             --error             --severity ERROR             --json-output semgrep-results.json             .
        continue-on-error: false

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

